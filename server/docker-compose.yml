services:
  server:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: fastapi_server

    ports:
      - "5000:5000"

    env_file:
      - .env

    volumes:
      - ./:/app

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 5000
      --reload

    depends_on:
      mongodb:
        condition: service_healthy

    restart: unless-stopped

    networks:
      - backend_network

  mongodb:
    image: mongo:8

    container_name: mongodb

    ports:
      - "27017:27017"

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}

    volumes:
      - mongo_data:/data/db

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    restart: unless-stopped

    networks:
      - backend_network

networks:
  backend_network:
    driver: bridge

volumes:
  mongo_data: