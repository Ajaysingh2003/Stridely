services:
  server:
    build: .
    ports:
      - "5000:5000"
    env_file: .env
    depends_on:
      - mongodb
  
    networks:
      - backend_network

  mongodb:
    image: mongo
    ports:
      - "27017:27017"

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}

    volumes:
      - mongo_data:/data/db 
    networks:
      - backend_network

networks:
  backend_network:
    driver: bridge

volumes:
  mongo_data:
